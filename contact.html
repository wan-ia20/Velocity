<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOCITY | Premium Sports Gear & Wellness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
@import url('https://fonts.googleapis.com/css?family=Montserrat:400,800');
:root {
--primary: #e63946;
--primary-dark: #c1121f;
--secondary: #1d3557;
--secondary-light: #457b9d;
--light: #f8f9fa;
--light-alt: #f1faee;
--dark: #212529;
--dark-alt: #343a40;
--accent: #a8dadc;
--gray: #6c757d;
--light-gray: #e9ecef;
--box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
--transition: all 0.3s ease-in-out;
}

* {
box-sizing: border-box;
}

body {
font-family: 'Montserrat', sans-serif;
background: #f6f5ee;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
margin: 0;
overflow-x: hidden;
}

.back-to-home-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
  background-color: rgba(255, 255, 255, 0.9);
  border: 1px solid rgba(29, 53, 87, 0.2);
  border-radius: 20px;
  padding: 8px 15px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #1d3557;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  font-size: 14px;
  font-weight: 500;
}

.back-to-home-btn:hover {
  background-color: #1d3557;
  color: white;
  border-color: #1d3557;
  transform: translateX(-3px);
}

.back-to-home-btn i {
  margin-right: 8px;
}

@media (max-width: 768px) {
  .back-to-home-btn {
    top: 15px;
    left: 15px;
    padding: 6px 12px;
    font-size: 13px;
  }
}
@media (max-width: 768px) {
.back-to-home-btn {
    top: 15px;
    left: 15px;
    padding: 6px 12px;
    font-size: 13px;
}
}
h1 {
font-weight: bold;
margin: 0;
}

p {
font-size: 14px;
font-weight: 100;
line-height: 20px;
letter-spacing: 0.5px;
margin: 20px 0 30px;
}

span {
font-size: 12px;
}

a {
color: #333;
font-size: 14px;
text-decoration: none;
margin: 15px 0;
}

.container-main {
background-color: #fff;
border-radius: 10px;
box-shadow: 0 14px 28px rgba(0,0,0,0.25),
            0 10px 10px rgba(0,0,0,0.22);
position: relative;
overflow: hidden;
width: 768px;
max-width: 100%;
min-height: 480px;
}

.form-container {
position: absolute;
top: 0;
height: 100%;
transition: all 0.6s ease-in-out;
background-color: #fff;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
padding: 0 50px;
text-align: center;
}

.sign-in-container {
left: 0;
width: 50%;
z-index: 2;
}

.sign-up-container {
left: 0;
width: 50%;
opacity: 0;
z-index: 1;
}

.container-main.right-panel-active .sign-in-container {
transform: translateX(100%);
}

.container-main.right-panel-active .sign-up-container {
transform: translateX(100%);
opacity: 1;
z-index: 5;
animation: show 0.6s;
}

@keyframes show {
0%, 49.99% {
    opacity: 0;
    z-index: 1;
}
50%, 100% {
    opacity: 1;
    z-index: 5;
}
}

.overlay-container {
position: absolute;
top: 0;
left: 50%;
width: 50%;
height: 100%;
overflow: hidden;
transition: transform 0.6s ease-in-out;
z-index: 100;
}

.container-main.right-panel-active .overlay-container {
transform: translateX(-100%);
}

.overlay {
background: var(--secondary); 
background-repeat: no-repeat;
background-size: cover;
background-position: 0 0;
color: #FFFFFF;
position: relative;
left: -100%;
height: 100%;
width: 200%;
transform: translateX(0);
transition: transform 0.6s ease-in-out;
}

.container-main.right-panel-active .overlay {
transform: translateX(50%);
}

.overlay-panel {
position: absolute;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
padding: 0 40px;
text-align: center;
top: 0;
height: 100%;
width: 50%;
transform: translateX(0);
transition: transform 0.6s ease-in-out;
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}

.overlay-left {
transform: translateX(-20%);
background-image: url('pics/foot\ ball\ img.jpg'); 
background: linear-gradient(rgba(29, 53, 87, 0.7), rgba(29, 53, 87, 0.7)), url('pics/foot\ ball\ img.jpg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}

.container-main.right-panel-active .overlay-left {
transform: translateX(0);
}

.overlay-right {
right: 0;
transform: translateX(0);
background-image: url('pics/basket\ ball\ img.jpg'); 
background: linear-gradient(rgba(29, 53, 87, 0.7), rgba(29, 53, 87, 0.7)), url('pics/basket\ ball\ img.jpg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}

.container-main.right-panel-active .overlay-right {
transform: translateX(20%);
}

button {
border-radius: 20px;
border: 1px solid #1d3557;
background-color: #1d3557;
color: #FFFFFF;
font-size: 12px;
font-weight: bold;
padding: 12px 45px;
letter-spacing: 1px;
text-transform: uppercase;
transition: transform 80ms ease-in;
cursor: pointer;
}

button.ghost {
background-color: transparent;
border-color: #ccc;
color: #ccc; 
transition: all 0.3s ease-in-out; 
}

button.ghost:hover {
background-color: transparent;
border-color: #FFFFFF;
color: #FFFFFF; 
}

button:active {
transform: scale(0.95);
}

button:focus {
outline: none;
}

form {
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
}

input {
background-color: #eee;
border: none;
padding: 12px 15px;
margin: 8px 0;
width: 100%;
border-radius: 5px;
}

.social-icons {
margin: 20px 0;
}

.social-icons a {
border: 1px solid #DDDDDD;
border-radius: 50%;
display: inline-flex;
justify-content: center;
align-items: center;
margin: 0 5px;
height: 40px;
width: 40px;
color: #333;
transition: background-color 0.3s ease;
}

.social-icons a:hover {
background-color: #1d3557;
color: #fff;
}

.forgot-password {
color: #333;
font-size: 12px;
}

@media (max-width: 768px) {
.container-main {
min-height: 600px;
width: 100%;
border-radius: 0;
box-shadow: none;
}

.form-container {
padding: 0 20px;
}

.sign-in-container,
.sign-up-container {
width: 100%;
height: 50%;
position: relative;
opacity: 1;
z-index: 2;
transform: none;
}

.sign-up-container {
z-index: 1;
}

.overlay-container {
display: none;
}

.container-main.right-panel-active .sign-in-container {
transform: translateY(100%);
z-index: 1;
}

.container-main.right-panel-active .sign-up-container {
transform: translateY(0%);
z-index: 2;
animation: none;
}


.container-main.right-panel-active .sign-in-container,
.container-main.right-panel-active .sign-up-container {
transition: transform 0.6s ease-in-out;
}


.overlay-panel {
width: 100%;
height: 50%;
position: relative;
transform: none;
display: flex;
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}


.container-main {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
width: 100%;
border-radius: 0;
box-shadow: none;
background-color: transparent;
}

.form-container {
position: relative;
height: auto;
width: 90%;
max-width: 400px;
margin-bottom: 20px;
transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
border-radius: 10px;
box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
padding: 30px 20px;
}

.sign-in-container,
.sign-up-container {
left: auto;
opacity: 1;
z-index: 1;
}

.overlay-container {
display: none;
}


.container-main.right-panel-active .sign-in-container {
opacity: 0;
height: 0;
padding: 0;
margin-bottom: 0;
overflow: hidden;
}
.container-main.right-panel-active .sign-up-container {
opacity: 1;
height: auto;
padding: 30px 20px;
margin-bottom: 20px;
}


.sign-up-container {
opacity: 0;
height: 0;
padding: 0;
margin-bottom: 0;
overflow: hidden;
}


.mobile-toggle-buttons {
display: flex;
justify-content: center;
width: 100%;
margin-top: 20px;
}
.mobile-toggle-buttons button {
width: 45%;
margin: 0 5px;
}
}
</style>
</head>
<body class="d-flex justify-content-center align-items-center flex-column min-vh-100 bg-light">
    <a href="index.html" class="back-to-home-btn" title="Return to Home">
  <i class="fas fa-arrow-left"></i> Return to Home
</a>

    <div class="container-main" id="container">
        <div class="form-container sign-up-container">
            <form action="#" method="post" class="w-100 h-100 d-flex flex-column justify-content-center align-items-center">
                <h1 class="mb-3">Create Account</h1>
                <div class="social-icons mb-3">
                    <a href="https://www.google.co.uk/" class="social"><i class="fab fa-google"></i></a>
                    <a href="https://www.facebook.com/" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://github.com/" class="social"><i class="fab fa-github"></i></a>
                    <a href="https://pk.linkedin.com/" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span class="mb-3">Use your email for registration</span>
                <input type="text" class="form-control mb-2" placeholder="Username" required />
                <input type="email" class="form-control mb-2" placeholder="Email" required />
                <input type="password" class="form-control mb-3" placeholder="Password" required />
                <button type="submit" class="btn btn-dark">Sign Up</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form action="#" method="post" class="w-100 h-100 d-flex flex-column justify-content-center align-items-center">
                <h1 class="mb-3">Sign In</h1>
                <div class="social-icons mb-3">
                    <a href="https://www.google.co.uk/" class="social"><i class="fab fa-google"></i></a>
                    <a href="https://www.facebook.com/" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://github.com/" class="social"><i class="fab fa-github"></i></a>
                    <a href="https://pk.linkedin.com/" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span class="mb-3">Use your account to sign in</span>
                <input type="email" class="form-control mb-2" placeholder="Email" required />
                <input type="password" class="form-control mb-3" placeholder="Password" required />
                <a href="#" class="forgot-password mb-3">Forgot your password?</a>
                <button type="submit" class="btn btn-dark">Sign In</button>
            </form>
        </div>

        <div class="overlay-container d-none d-md-block"> <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="ghost btn btn-light" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p>Don't have an account?</p>
                    <button class="ghost btn btn-light" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>

    </div>

    <div class="mobile-toggle-buttons d-md-none mt-4">
        <button class="btn btn-secondary me-2" id="mobileSignInToggle">Sign In</button>
        <button class="btn btn-secondary ms-2" id="mobileSignUpToggle">Sign Up</button>
    </div>


    <script>

const signUpButton = document.getElementById('signUp');
const signInButton = document.getElementById('signIn');
const container = document.getElementById('container');
const mobileSignInToggle = document.getElementById('mobileSignInToggle');
const mobileSignUpToggle = document.getElementById('mobileSignUpToggle');

if (signUpButton && signInButton) { 
    signUpButton.addEventListener('click', () => {
        container.classList.add("right-panel-active");
    });

    signInButton.addEventListener('click', () => {
        container.classList.remove("right-panel-active");
    });
}

if (mobileSignInToggle && mobileSignUpToggle) {
    mobileSignUpToggle.addEventListener('click', () => {
        container.classList.add("right-panel-active");
    });

    mobileSignInToggle.addEventListener('click', () => {
        container.classList.remove("right-panel-active");
    });
}

document.addEventListener('DOMContentLoaded', function() {

    const modal = document.createElement('div');
    modal.id = 'successModal';
    modal.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        z-index: 10000;
        display: none;
        text-align: center;
        max-width: 80%;
    `;
    document.body.appendChild(modal);

    // Add error message elements
    const signupPasswordInput = document.querySelector('.sign-up-container input[type="password"]');
    if (signupPasswordInput) {
        const errorElement = document.createElement('div');
        errorElement.className = 'password-error';
        errorElement.style.cssText = `
            color: #e63946;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
            display: none;
        `;
        signupPasswordInput.parentNode.insertBefore(errorElement, signupPasswordInput.nextSibling);
    }

    const signupForm = document.querySelector('.sign-up-container form');
    if (signupForm) {
        signupForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = signupForm.querySelector('input[type="email"]').value;
            const password = signupForm.querySelector('input[type="password"]').value;
            const errorElement = signupForm.querySelector('.password-error');
            
            if (errorElement) errorElement.style.display = 'none';
            
            if (password.length < 8) {
                if (errorElement) {
                    errorElement.textContent = 'Password must be at least 8 characters long';
                    errorElement.style.display = 'block';
                }
                return;
            }
        
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showModal('Please enter a valid email address');
                return;
            }
            
            showModal('Account created successfully!');
            
            signupForm.reset();
        });
    }

    const signinForm = document.querySelector('.sign-in-container form');
    if (signinForm) {
        signinForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = signinForm.querySelector('input[type="email"]').value;
            const password = signinForm.querySelector('input[type="password"]').value;
            
            if (!email || !password) {
                showModal('Please fill in all fields');
                return;
            }
    
            showModal('Logged in successfully!');
        });
    }


    function showModal(message) {
        modal.innerHTML = `
            <p style="margin-bottom: 20px; font-size: 16px;">${message}</p>
            <button onclick="closeModal()" style="
                background: #1d3557;
                color: white;
                border: none;
                padding: 10px 25px;
                border-radius: 20px;
                cursor: pointer;
                font-size: 14px;
                font-weight: bold;
            ">OK</button>
        `;
        modal.style.display = 'block';
        

        const overlay = document.createElement('div');
        overlay.id = 'modalOverlay';
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
        `;
        document.body.appendChild(overlay);
    }


    window.closeModal = function() {
        document.getElementById('successModal').style.display = 'none';
        const overlay = document.getElementById('modalOverlay');
        if (overlay) overlay.remove();
    };
});


function setInitialMobileState() {
    if (window.innerWidth < 768) {
        container.classList.remove("right-panel-active"); 
    }
}

window.addEventListener('load', setInitialMobileState);
window.addEventListener('resize', setInitialMobileState);
</script>

</body>
</html>
